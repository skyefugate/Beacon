name: beacon-dev
description: Development agent for Beacon with automated code quality checks

hooks:
  # Auto-format Python code after writing
  - name: format-python
    event: PostToolUse
    matcher: fs_write
    command: |
      #!/bin/bash
      set -e
      
      # Parse hook event to get modified files
      FILES=$(echo "$HOOK_EVENT" | jq -r '.tool_input.path // empty' | grep -E '\.py$' || true)
      
      if [ -n "$FILES" ]; then
        cd "$CWD"
        # Activate venv if it exists
        [ -f venv/bin/activate ] && source venv/bin/activate
        
        # Format with ruff
        ruff format "$FILES" 2>&1 || true
        ruff check --fix "$FILES" 2>&1 || true
        
        echo "✓ Formatted Python files"
      fi
    timeout_ms: 10000

  # Run tests after modifying test files or source
  - name: run-tests
    event: Stop
    command: |
      #!/bin/bash
      cd "$CWD"
      [ -f venv/bin/activate ] && source venv/bin/activate
      
      # Only run if pytest is available
      if command -v pytest &> /dev/null; then
        # Run fast unit tests only (skip integration)
        pytest tests/ -x -q -m "not integration" --tb=short 2>&1 || {
          echo "⚠ Some tests failed - review before committing"
          exit 0  # Don't block, just warn
        }
        echo "✓ Tests passed"
      fi
    timeout_ms: 30000

  # Type check Python files after writing
  - name: type-check
    event: PostToolUse
    matcher: fs_write
    command: |
      #!/bin/bash
      FILES=$(echo "$HOOK_EVENT" | jq -r '.tool_input.path // empty' | grep -E '^src/.*\.py$' || true)
      
      if [ -n "$FILES" ]; then
        cd "$CWD"
        [ -f venv/bin/activate ] && source venv/bin/activate
        
        if command -v mypy &> /dev/null; then
          mypy "$FILES" 2>&1 || {
            echo "⚠ Type check warnings - review output"
            exit 0
          }
          echo "✓ Type check passed"
        fi
      fi
    timeout_ms: 15000
    cache_ttl_seconds: 300  # Cache for 5 minutes

  # Validate YAML files after writing
  - name: validate-yaml
    event: PostToolUse
    matcher: fs_write
    command: |
      #!/bin/bash
      FILES=$(echo "$HOOK_EVENT" | jq -r '.tool_input.path // empty' | grep -E '\.(yaml|yml)$' || true)
      
      if [ -n "$FILES" ]; then
        python3 -c "import yaml; yaml.safe_load(open('$FILES'))" 2>&1 || {
          echo "⚠ YAML validation failed"
          exit 1
        }
        echo "✓ YAML valid"
      fi
    timeout_ms: 5000

  # Add project context on agent spawn
  - name: project-context
    event: AgentSpawn
    command: |
      #!/bin/bash
      cat << 'EOF'
      Beacon Development Environment:
      - Python managed via Homebrew + venv
      - Run tests: pytest tests/ -m "not integration"
      - Format: ruff format src/ tests/
      - Lint: ruff check src/ tests/
      - Type check: mypy src/
      - Hooks auto-run formatting and tests
      EOF
    timeout_ms: 1000
