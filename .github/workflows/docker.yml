name: Docker Build & Push

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 4 * * *'  # 4am UTC daily
  workflow_dispatch:       # manual trigger when needed

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for multi-platform builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata — beacon-core
        id: meta-core
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/beacon-core
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Extract metadata — beacon-collector
        id: meta-collector
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/beacon-collector
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push beacon-core
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.core
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-core.outputs.tags }}
          labels: ${{ steps.meta-core.outputs.labels }}
          cache-from: type=gha,scope=beacon-core
          cache-to: type=gha,mode=max,scope=beacon-core

      - name: Build and push beacon-collector
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.collector
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-collector.outputs.tags }}
          labels: ${{ steps.meta-collector.outputs.labels }}
          cache-from: type=gha,scope=beacon-collector
          cache-to: type=gha,mode=max,scope=beacon-collector
