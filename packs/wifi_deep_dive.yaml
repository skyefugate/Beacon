name: wifi_deep_dive
description: "Wi-Fi focused diagnostic — signal quality, channel analysis, and local path"
version: "1.0"
timeout_seconds: 120

steps:
  - plugin: device
    type: collector
    privileged: false

  - plugin: wifi
    type: collector
    privileged: true

  - plugin: path
    type: collector
    privileged: true

  - plugin: lan
    type: collector
    privileged: false

  - plugin: ping
    type: runner
    privileged: false
    config:
      targets:
        - "8.8.8.8"
        - "1.1.1.1"
      count: 20
      interval: 0.2

  - plugin: dns
    type: runner
    privileged: false
    config:
      targets:
        - "google.com"
      extra:
        resolvers:
          - "8.8.8.8"

metadata:
  category: wifi
  estimated_duration_seconds: 60
